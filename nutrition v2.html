function MacroBar({label, value, color}){
  const targets = {БЕЛОК:165, ЖИРЫ:67, УГЛЕВОДЫ:258, КЛЕТЧАТКА:35};
  const max = targets[label] || 100;
  const pct = Math.min((value/max)*100,100);
  return(
    <div style={{marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
        <span style={{fontSize:"0.65rem",color:"#7a7a9a",letterSpacing:"0.08em"}}>{label}</span>
        <span style={{fontSize:"0.65rem",fontWeight:700,color}}>{value}г / {max}г</span>
      </div>
      <div style={{height:5,background:"#1e1e30",borderRadius:3,overflow:"hidden"}}>
        <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:3}}/>
      </div>
    </div>
  );
}

  const totalF=realMeals.reduce((s,m)=>s+m.f,0);

          </div>
          {ironFoods.map((f,i)=>(
            <div key={i} style={{background:"#0f1a0f",border:"1px solid #1a2a1a",
              borderLeft:`3px solid ${f.type==="гем"?"#e74c3c":"#f59e0b"}`,
              borderRadius:10,padding:"10px 12px",marginBottom:7,
              display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:"0.82rem"}}>{f.name}</div>
                <div style={{fontSize:"0.62rem",color:"#3a6a3a",marginTop:2}}>
                  {f.type==="гем"?"🔴 Гемовое — усвоение 15–35%":"🟡 Негемовое — усвоение 2–20% (с вит.C ×3)"}
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:"0.82rem",fontWeight:900,color:f.type==="гем"?"#e74c3c":"#f59e0b"}}>{f.val}</div>
                <div style={{fontSize:"0.52rem",color:"#4ade80",marginTop:2}}>{f.tag}</div>
              </div>
            </div>
          ))}

          <div style={{marginTop:14,background:"#0a1a12",border:"1px solid #2a5a2a44",
            borderRadius:12,padding:"12px 14px"}}>
            <div style={{fontSize:"0.62rem",letterSpacing:"0.1em",color:"#3a6a3a",marginBottom:8}}>
              💡 ОМЕГА-3 БЕЗ РЫБЫ
            </div>
            {[
              ["Льняное масло","1 ч.л./день в кашу","ALA → частично в EPA/DHA. Не жарить!"],
              ["Грецкие орехи","20г/день (4–5 шт)","Лучший орех по омега-3 + мелатонин"],
              ["Авокадо","½ шт/день","Мononенасыщенные жиры для тестостерона"],
              ["Семена чиа (опционально)","15г/день","5г омега-3 на 100г — рекорд среди растений"],
            ].map(([name,dose,desc],i)=>(
              <div key={i} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:"0.75rem",fontWeight:700,color:"#a0c0e0"}}>{name}</span>
                  <span style={{fontSize:"0.6rem",color:"#4ade80",fontWeight:600}}>{dose}</span>
                </div>
                <div style={{fontSize:"0.62rem",color:"#3a5a6a",marginTop:2}}>{desc}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* RULES */}
      {tab==="rules"&&(
        <div style={{padding:"14px 12px 70px"}}>
          <div style={{fontSize:"0.62rem",letterSpacing:"0.15em",color:"#3a6a3a",marginBottom:12}}>
            КЛЮЧЕВЫЕ ПРАВИЛА
          </div>
          {rules.map((r,i)=>(
            <div key={i} style={{background:"#0f1a0f",border:"1px solid #1a2a1a",
              borderRadius:10,padding:"12px 14px",marginBottom:8,
              display:"flex",gap:12,alignItems:"flex-start"}}>
              <span style={{fontSize:"1.3rem",flexShrink:0}}>{r.icon}</span>
              <div>
                <div style={{fontWeight:700,fontSize:"0.82rem"}}>{r.title}</div>
                <div style={{fontSize:"0.65rem",color:"#4a7a4a",marginTop:4,lineHeight:1.5}}>{r.desc}</div>
              </div>
            </div>
          ))}

          <div style={{marginTop:14,background:"#0d1020",border:"1px solid #60a5fa33",
            borderRadius:12,padding:"14px"}}>
            <div style={{fontSize:"0.62rem",letterSpacing:"0.1em",color:"#3a6a3a",marginBottom:8}}>
              💊 МИНИМАЛЬНЫЕ ДОБАВКИ
            </div>
            {[
              ["Витамин D3 + K2","2000–4000 МЕ","Тестостерон, иммунитет — особенно при сидячей работе"],
              ["Магний глицинат","300–400 мг на ночь","Сон, восстановление, снижает кортизол"],
              ["Цинк","15–25 мг с едой","Прямой предшественник тестостерона"],
              ["Омега-3 (капсулы)","2г EPA+DHA","Если чувствуешь что льняного масла мало"],
            ].map(([name,dose,desc],i)=>(
              <div key={i} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:"0.75rem",fontWeight:700,color:"#a0c0e0"}}>{name}</span>
                  <span style={{fontSize:"0.6rem",color:"#60a5fa",fontWeight:600}}>{dose}</span>
                </div>
                <div style={{fontSize:"0.62rem",color:"#3a5a6a",marginTop:2}}>{desc}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Bottom */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",
        width:"100%",maxWidth:480,
        background:"linear-gradient(0deg,#0b0f0e 65%,transparent)",
        padding:"10px 16px 16px",textAlign:"center"}}>
        <div style={{fontSize:"0.56rem",color:"#2a4a2a",letterSpacing:"0.04em"}}>
          🔩 Fe = железо · Дни отдыха: убери ⚡ пре и 💪 пост → −520 ккал
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
