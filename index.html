<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>Мой план</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Мой план"/>
  <meta name="theme-color" content="#0d0d14"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{
      background:#0d0d14;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      font-family:'Inter','Segoe UI',sans-serif;
      color:#e8e8f0;
      padding:24px;
    }
    .logo{
      font-size:0.6rem;
      letter-spacing:0.25em;
      color:#3a3a5e;
      margin-bottom:10px;
    }
    .title{
      font-size:2rem;
      font-weight:900;
      letter-spacing:0.04em;
      background:linear-gradient(90deg,#e8e8f0 40%,#9a7fff);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-align:center;
      margin-bottom:6px;
    }
    .sub{
      font-size:0.7rem;
      color:#3a3a5e;
      text-align:center;
      margin-bottom:48px;
    }
    .btn{
      display:flex;
      align-items:center;
      gap:18px;
      width:100%;
      max-width:340px;
      padding:20px 22px;
      border-radius:16px;
      border:none;
      cursor:pointer;
      text-decoration:none;
      margin-bottom:14px;
      transition:transform 0.12s ease, opacity 0.12s ease;
      -webkit-tap-highlight-color:transparent;
    }
    .btn:active{transform:scale(0.97);opacity:0.85;}
    .btn-workout{
      background:linear-gradient(135deg,#7c1f2e,#1a1a2e);
      border:1px solid #e74c3c44;
    }
    .btn-nutrition{
      background:linear-gradient(135deg,#1a4a1a,#0d1a0d);
      border:1px solid #4ade8044;
    }
    .btn-icon{font-size:2.2rem;flex-shrink:0;}
    .btn-text{text-align:left;}
    .btn-label{
      font-size:1rem;
      font-weight:900;
      letter-spacing:0.04em;
      color:#e8e8f0;
      margin-bottom:3px;
    }
    .btn-desc{font-size:0.65rem;color:#5a5a7e;line-height:1.4;}
    .btn-workout .btn-label{color:#e74c3c;}
    .btn-nutrition .btn-label{color:#4ade80;}
    .footer{
      position:fixed;
      bottom:20px;
      font-size:0.55rem;
      color:#2a2a3e;
      letter-spacing:0.08em;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="logo">НАУЧНЫЙ ПЛАН · JEFF NIPPARD</div>
  <div class="title">МОЙ ПЛАН</div>
  <div class="sub">UL/PPL · Рекомпозиция · 75–85 мин</div>

  <a href="workout.html" class="btn btn-workout">
    <span class="btn-icon">🏋️</span>
    <div class="btn-text">
      <div class="btn-label">ТРЕНИРОВКИ</div>
      <div class="btn-desc">UL/PPL сплит · 5 дней в неделю<br/>S-тир упражнения по Ниппарду</div>
    </div>
  </a>

  <a href="nutrition_v2.html" class="btn btn-nutrition">
    <span class="btn-icon">🥗</span>
    <div class="btn-text">
      <div class="btn-label">ПИТАНИЕ</div>
      <div class="btn-desc">2 400 ккал · Б165 / Ж67 / У258<br/>Без рыбы · Зал в 8:00 · Железо ✓</div>
    </div>
  </a>

  <div class="footer">Нажми "Поделиться" → "На экран Домой" в Safari</div>
</body>
</html>
